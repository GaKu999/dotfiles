# ${XDG_CONFIG_HOME}/mpv/encoding-profiles.conf
# vim:ft=dosini:fenc=utf-8:

[big-cache]
cache=yes
demuxer-max-bytes=2GiB
demuxer-readahead-secs=120

[slow]
framedrop=no
profile=gpu-hq

[webcam]
profile=low-latency
untimed

[webcam-fast]
demuxer-lavf-format=video4linux2
demuxer-lavf-o-set=input_format=mjpeg
profile=webcam
